name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write # Allow the workflow to read and write repository contents (e.g., for commit status updates)

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js (LTS recommended)
        uses: actions/setup-node@v4
        with:
          node-version: '23'   # use LTS if you don't need v23

      - name: Frontend Syntax Check
        run: |
          cd frontend
          find . \( -name "*.js" -o -name "*.jsx" \) -exec node --check {} +

      - name: Backend Syntax Check
        run: |
         cd backend
         python -m compileall . 

  gitleaks-scan:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gitleaks Setup
        uses: gitleaks/gitleaks-action@v2

      - name: Gitleaks Scan
        run: |
          gitleaks detect --source ./frontend --exit-code 1
          gitleaks detect --source ./backend --exit-code 1

  trivy_fs_scan:
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy Scan
        run: |
          trivy fs --severity CRITICAL,HIGH --ignore-unfixed .

  build_backend_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: trivy_fs_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image (backend)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            mahendravarmasa/todobackend:latest
            mahendravarmasa/todobackend:${{ env.IMAGE_TAG }}
  
  build_frontend_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: trivy_fs_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image (frontend)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            mahendravarmasa/todofrontend:latest
            mahendravarmasa/todofrontend:${{ env.IMAGE_TAG }}

  trivy_image_scan:
      runs-on: ubuntu-latest
      needs:
      - build_backend_docker_image_and_push
      - build_frontend_docker_image_and_push

      steps:
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan backend image
        run: |
          trivy image --severity CRITICAL,HIGH --ignore-unfixed mahendravarmasa/todobackend:${{ env.IMAGE_TAG }}

      - name: Scan frontend image
        run: |
          trivy image --severity CRITICAL,HIGH --ignore-unfixed mahendravarmasa/todofrontend:${{ env.IMAGE_TAG }}

  update_cd_repo:
    runs-on: ubuntu-latest
    needs: trivy_image_scan
    steps:
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: mahendravarmasa-stack/Gitops-CD
          ref: main
          token: ${{ secrets.CD_REPO_TOKEN }}
          path: cd

      - name: Bump images in manifests (safe)
        working-directory: cd
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o yq && sudo install yq /usr/local/bin/yq

          # -- Safety cleanup: remove any accidental .spec.template from Service docs
          yq -i '(. | select(.kind=="Service")) |= del(.spec.template)' todoyaml/backend.yaml
          yq -i '(. | select(.kind=="Service")) |= del(.spec.template)' todoyaml/frontend.yaml

          # -- Update ONLY Deployment images (backend)
          yq -i '
            (. | select(.kind=="Deployment")
               | .spec.template.spec.containers[]
               | select(.name=="backend")
               | .image)
            = "mahendravarmasa/todobackend:" + strenv(IMAGE_TAG)
          ' todoyaml/backend.yaml

          # -- Update ONLY Deployment images (frontend)
          yq -i '
            (. | select(.kind=="Deployment")
               | .spec.template.spec.containers[]
               | select(.name=="frontend")
               | .image)
            = "mahendravarmasa/todofrontend:" + strenv(IMAGE_TAG)
          ' todoyaml/frontend.yaml

      - name: Commit & push to CD repo
        working-directory: cd
        run: |
          git config user.name "Mahendravarma"
          git config user.email "mahendravarmasa@gmail.com"
          git add -A
          git commit -m "bump images to ${IMAGE_TAG}" || echo "no changes"
          git push